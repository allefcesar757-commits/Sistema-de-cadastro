
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Congresso de Tecnologia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Congresso de Tecnologia</h1>

        <form id="formCadastro">

            <h2>Dados Pessoais</h2>

            <input type="text" id="nome" placeholder="Nome completo" required>

            <input type="text" id="endereco" placeholder="Endereço completo" required>

            <input type="text" id="cep" placeholder="CEP" required>

            <input type="text" id="cidade" placeholder="Cidade" required>

            <select id="uf" required>
                <option value="">Selecione a UF</option>
                <option>PE</option>
                <option>AL</option>
                <option>BA</option>
                <option>PB</option>
                <option>RN</option>
                <option>CE</option>
                <option>SE</option>
            </select>

            <input type="email" id="email" placeholder="E-mail" required>

            <input type="password" id="senha" placeholder="Senha" required>

            <div class="sexo">
                <p>Sexo:</p>

                <label>
                    <input type="radio" name="sexo" value="Masculino">
                    Masculino
                </label>

                <label>
                    <input type="radio" name="sexo" value="Feminino">
                    Feminino
                </label>
            </div>

            <input type="text" id="telefone" placeholder="Telefone">

            <input type="text" id="cpf" placeholder="CPF">

            <h2>Dados Profissionais</h2>

            <input type="text" id="cargo" placeholder="Cargo">

            <input type="text" id="empresa" placeholder="Empresa onde trabalha">

            <input type="number" id="tempoProfissao" placeholder="Tempo de profissão">

            <input type="number" id="salario" step="0.01" placeholder="Salário">

            <h2>Palestras que deseja participar</h2>

            <label>
                <input type="checkbox" value="Inteligência Artificial">
                Inteligência Artificial
            </label>

            <label>
                <input type="checkbox" value="Segurança da Informação">
                Segurança da Informação
            </label>

            <label>
                <input type="checkbox" value="Cloud Computing">
                Cloud Computing
            </label>

            <label>
                <input type="checkbox" value="Desenvolvimento Web">
                Desenvolvimento Web
            </label>

            <label>
                <input type="checkbox" value="Banco de Dados">
                Banco de Dados
            </label>

            <label>
                <input type="checkbox" value="Python">
                Python
            </label>

            <br><br>

            <button type="submit">Cadastrar</button>

        </form>

        <p id="mensagem"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
